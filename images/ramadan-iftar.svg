<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Ramadan iftar gathering — decorative placeholder, photo to be added">
  <defs>
    <linearGradient id="bg-ramadan-iftar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1ece1"/>
      <stop offset="1" stop-color="#e7e0cf"/>
    </linearGradient>
    <pattern id="pat-ramadan-iftar" width="70" height="70" patternUnits="userSpaceOnUse">
      <g stroke="#c9a227" stroke-width="1" fill="none" opacity="0.3">
        <rect x="13" y="13" width="32" height="32"/>
        <rect x="13" y="13" width="32" height="32" transform="rotate(45 29 29)"/>
      </g>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg-ramadan-iftar)"/>
  <rect width="800" height="600" fill="url(#pat-ramadan-iftar)"/>
  <g transform="translate(400,300)">
    <circle r="86" fill="#f1ece1" opacity="0.55"/>
    <circle r="86" fill="none" stroke="#1b4332" stroke-width="2.5" opacity="0.55"/>
    <g stroke="#c9a227" stroke-width="3" fill="none">
      <rect x="-46" y="-46" width="92" height="92" transform="rotate(45)"/>
      <rect x="-46" y="-46" width="92" height="92"/>
    </g>
    <circle r="14" fill="#1b4332" opacity="0.85"/>
  </g>
</svg>
